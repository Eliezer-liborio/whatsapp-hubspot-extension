<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WhatsApp → HubSpot</title>
  <style>
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      padding: 15px;
      background-color: #f5f8fa;
      color: #33475b;
    }
    h2 {
      color: #ff7a59;
      font-size: 18px;
      margin-top: 0;
      text-align: center;
    }
    .container {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .info {
      font-size: 14px;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      background-color: #ff7a59;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #e56b4d;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #00a4bd;
      display: none;
    }
    .footer {
      margin-top: 15px;
      font-size: 11px;
      text-align: center;
      color: #7c98b6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>WhatsApp → HubSpot</h2>
    
    <div class="info">
      Abra uma conversa no WhatsApp Web e clique no botão abaixo para salvar o histórico na timeline do cliente no HubSpot CRM.
    </div>
    
    <button id="exportBtn">Exportar Conversa Atual</button>
    <div id="statusMsg" class="status">Processando...</div>
  </div>
  
  <div class="footer">
    Integração via Middleware Node.js
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
